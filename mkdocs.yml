site_name: Network Automation Primer
site_description: Tools and Practices for Network Engineers
nav:
  - Home: index.md
  - WSL/VS Code: wsl_vscode.md
  - netbox-docker: netbox_docker.md
  - containerlab: containerlab.md
  - Intermediate labs:
    - netbox/nornir: netbox_nornir.md

repo_url: https://github.com/joshgilby/automationprimer
repo_name: joshgilby/automationprimer

theme:
  name: material
  pallette:
    scheme: default
  features:
    - navigation.tracking
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
